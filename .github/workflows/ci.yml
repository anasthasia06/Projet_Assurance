name: CI Pipeline — Assurance Auto

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  ci:
    name: Qualité du code & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Flake8 — Erreurs critiques (syntaxe, imports)
        run: |
          pip install flake8
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 — Qualité générale (avertissements)
        run: |
          flake8 src/ tests/ --count --exit-zero --max-line-length=120 --statistics

      - name: Black — Vérification du formatage
        run: |
          pip install black
          black --check src/ tests/ --line-length 120

      - name: Pytest — Tests unitaires
        run: |
          pip install pytest pytest-cov httpx
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
